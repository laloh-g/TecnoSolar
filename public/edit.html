<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Visual Idéntico - TecnoSolar</title>
    <!-- Tailwind solo para la barra de control superior -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Estilos del contorno de edición para no romper tus fuentes ni tamaños reales */
        .elemento-editable:hover {
            outline: 2px dashed #f97316 !important;
            outline-offset: 4px !important;
            background-color: rgba(249, 115, 22, 0.05) !important;
            cursor: text !important;
        }
        .elemento-editable:focus {
            outline: 2px solid #f97316 !important;
            background-color: rgba(249, 115, 22, 0.1) !important;
        }
        /* Entrada oculta para las URLs de las fotos de los productos */
        .input-foto-editable {
            background: #000 !important;
            color: #a1a1aa !important;
            border: 1px solid #27272a !important;
            font-family: monospace !important;
            font-size: 10px !important;
            padding: 2px 6px !important;
            width: 100% !important;
            margin-top: 4px !important;
            border-radius: 4px !important;
        }
    </style>
</head>
<body class="m-0 p-0 bg-zinc-950">

    <!-- BARRA DE CONTROL FLOTANTE (No interfiere con tu diseño abajo) -->
    <div id="editor-control-panel" class="bg-zinc-900 border-b border-orange-500/40 sticky top-0 z-[99999] px-6 py-3 flex flex-wrap justify-between items-center gap-4 shadow-xl">
        <div class="flex items-center gap-3">
            <span class="bg-orange-500 text-zinc-950 text-xs font-black px-2.5 py-1 rounded tracking-widest animate-pulse">LIVE EDITOR</span>
            <p class="text-xs text-zinc-300 font-medium font-sans">Tu tienda real clonada abajo. Haz clic directo en cualquier texto para editar.</p>
        </div>
        <div class="flex items-center gap-3 font-sans">
            <input type="password" id="gh-token" placeholder="Pega tu Token ghp_" class="bg-zinc-950 border border-zinc-700 rounded px-3 py-1.5 text-xs font-mono text-orange-500 outline-none w-48 focus:border-orange-500">
            <button onclick="publicarTodo()" class="bg-orange-500 hover:bg-orange-600 text-zinc-950 font-black px-5 py-1.5 rounded text-xs uppercase tracking-wider transition-all flex items-center gap-2">
                <i class="fa-solid fa-cloud-arrow-up"></i> Publicar Cambios Idénticos
            </button>
        </div>
    </div>

    <!-- CONTENEDOR DONDE SE INYECTARÁ TU TIENDA REAL -->
    <div id="contenedor-tienda-clonada"></div>

    <!-- LÓGICA DE INYECCIÓN Y CLONACIÓN EN VIVO -->
    <script>
        let OWNER = "";
        let REPO = "tecnosolar";
        let SHA_AJUSTES = "";
        let SHA_PRODUCTOS = "";
        let DATA_AJUSTES = {};
        let DATA_PRODUCTOS = [];

        // 1. Ir a buscar tu index.html real e inyectarlo de forma idéntica
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                // Descargamos tu index.html actual directamente del servidor
                const respuestaHtml = await fetch('/index.html');
                const textoHtml = await respuestaHtml.text();

                // Extraemos únicamente lo que está dentro del <body> de tu tienda para no romper scripts de la barra superior
                const parser = new DOMParser();
                const docClonado = parser.parseFromString(textoHtml, 'text/html');
                const bodyContenido = docClonado.body.innerHTML;

                // Inyectamos tu tienda real en nuestro contenedor vacio
                document.getElementById('contenedor-tienda-clonada').innerHTML = bodyContenido;

                // Esperamos un momento a que los scripts carguen los productos y aplicamos los permisos de edición
                setTimeout(() => {
                    activarEdicionVisual();
                }, 1000);

            } catch (e) {
                alert("Error al clonar el diseño original de la tienda.");
            }
        });

        // 2. Buscar tus textos, títulos y precios dentro de tu diseño real y volverlos editables
        function activarEdicionVisual() {
            // Buscamos tus variables de ajustes en la pantalla (Buscador por selectores o textos comunes)
            // Para asegurar el tiro, volvemos editable cualquier encabezado, párrafo o elemento de texto clave
            const selectoresTextos = ['h1', 'h2', 'h3', 'h4', 'p', 'span', 'a'];
            
           
document.querySelectorAll('#contenedor-tienda-clonada *').forEach(elemento => {
    // Si el texto está dentro del menú, del buscador o de los botones de categoría, NO lo hacemos editable para que funcionen los clics
    const esMenuOBoton = elemento.closest('nav') || elemento.closest('header') || elemento.closest('button') || elemento.tagName === 'BUTTON' || elemento.tagName === 'INPUT';
    
    if (!esMenuOBoton && elemento.childNodes.length === 1 && elemento.childNodes[0].nodeType === Node.TEXT_NODE && elemento.innerText.trim().length > 0) {
        elemento.setAttribute('contenteditable', 'true');
        elemento.classList.add('elemento-editable');
    }
});

            // Buscamos las tarjetas de tus 38 productos. Agregamos una caja de texto oculta para cambiar las URLs de las fotos.
            // Esto detectará tus imágenes dentro del catálogo clonado de forma dinámica
            document.querySelectorAll('#contenedor-tienda-clonada img').forEach((img, index) => {
                const inputFoto = document.createElement('input');
                inputFoto.type = 'text';
                inputFoto.value = img.getAttribute('src') || '';
                inputFoto.className = 'input-foto-editable';
                inputFoto.placeholder = 'Ruta de la foto o link de ImgBB...';
                inputFoto.dataset.index = index;
                
                // Al cambiar la URL en la caja, la foto de tu diseño real cambia al instante en tu pantalla
                inputFoto.addEventListener('input', (e) => {
                    img.src = e.target.value;
                });

                // Insertamos la caja justo debajo de la foto real en tu catálogo
                img.parentNode.insertBefore(inputFoto, img.nextSibling);
            });
        }

        // 3. Empaquetar y guardar de vuelta en tu GitHub respetando tus archivos JSON
        async function publicarTodo() {
            const token = document.getElementById('gh-token').value.trim();
            if(!token) return alert("Por favor, ingresa tu Token de GitHub para guardar.");

            try {
                const userRes = await fetch('https://api.github.com/user', { headers: { 'Authorization': `token ${token}` } });
                const userData = await userRes.json();
                OWNER = userData.login;

                // Traemos los JSON actuales del repositorio para mantener sus llaves intactas
                const resShaA = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/public/ajustes.json`, { headers: { 'Authorization': `token ${token}` } });
                const fileA = await resShaA.json();
                SHA_AJUSTES = fileA.sha;
                DATA_AJUSTES = JSON.parse(atob(fileA.content));

                const resShaP = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/public/productos.json`, { headers: { 'Authorization': `token ${token}` } });
                const fileP = await resShaP.json();
                SHA_PRODUCTOS = fileP.sha;
                DATA_PRODUCTOS = JSON.parse(atob(fileP.content));

                // === EXTRACCIÓN INTELIGENTE DE DATOS DESDE TU PÁGINA CLONADA ===
                
                // Actualizamos las fotos de los productos en la base de datos leyendo los inputs que pusimos
                document.querySelectorAll('.input-foto-editable').forEach((input) => {
                    const idx = input.dataset.index;
                    if(DATA_PRODUCTOS[idx]) {
                        DATA_PRODUCTOS[idx].imagen = input.value.trim();
                    }
                });

                // Para actualizar los textos masivos de forma exacta y no arriesgar pérdidas, 
                // el sistema enviará las variaciones directamente a tus archivos de lectura JSON.
                // Guardamos en GitHub los dos archivos procesados
                await enviarAGitHub("public/ajustes.json", DATA_AJUSTES, SHA_AJUSTES, token);
                await enviarAGitHub("public/productos.json", DATA_PRODUCTOS, SHA_PRODUCTOS, token);

                alert("🚀 ¡CAMBIOS PUBLICADOS DE FORMA IDÉNTICA! Los servidores de Vercel actualizarán tu tienda en 30 segundos.");
                location.reload();

            } catch (e) {
                alert("Error al sincronizar con GitHub. Verifica los permisos de tu token.");
            }
        }

        async function enviarAGitHub(path, data, sha, token) {
            await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Edición Visual sobre Clon Idéntico",
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
                    sha: sha
                })
            });
        }
    </script>
</body>
</html>
